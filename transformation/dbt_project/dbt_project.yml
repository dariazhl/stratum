name: stratum
version: 1.0.0
config-version: 2

profile: dbt_project

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  stratum:
    silver:
      +materialized: incremental
      +schema: silver
      +file_format: delta
      +incremental_strategy: merge
    gold:
      +materialized: table
      +schema: gold
      +file_format: delta